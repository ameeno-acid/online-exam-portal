<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Students - Admin Portal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .dashboard-container { display: flex; width: 100%; height: 100vh; background: var(--background); }
        .sidebar {
            width: 250px; background: var(--surface); border-right: 1px solid var(--border);
            padding: 20px 0; display: flex; flex-direction: column; z-index: 10;
        }
        .sidebar-header { padding: 0 20px 20px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
        .sidebar-header h2 { font-size: 20px; color: var(--admin-color); }
        .nav-link {
            padding: 15px 20px; color: var(--text-muted); text-decoration: none;
            display: flex; align-items: center; gap: 12px; font-weight: 500; transition: var(--transition);
        }
        .nav-link:hover, .nav-link.active { color: var(--admin-color); background: rgba(15, 23, 42, 0.05); border-right: 4px solid var(--admin-color); }
        .main-content { flex: 1; padding: 40px; overflow-y: auto; z-index: 10; }
        .top-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        
        .panel { background: var(--surface); padding: 24px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); border: 1px solid var(--border); }
        .panel h3 { margin-bottom: 20px; color: var(--admin-color); font-size: 18px; }
        .table-responsive { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border); }
        th { color: var(--text-muted); font-weight: 600; font-size: 14px; }
        td { font-size: 15px; color: var(--text-main); }
        
        .btn-delete { color: #ef4444; background: none; border: none; cursor: pointer; padding: 6px; border-radius: 4px; transition: var(--transition); display: flex; align-items: center; gap: 6px; }
        .btn-delete:hover { background: rgba(239, 68, 68, 0.1); }
        
        .logout-btn { margin-top: auto; margin-bottom: 0; color: #ef4444; }
        .logout-btn:hover { color: #dc2626; background: rgba(239, 68, 68, 0.1); border-right-color: transparent; }
    </style>
</head>
<body class="admin-mode">
    <div class="background-blobs">
        <img src="{{ url_for('static', filename='assets/blob.svg') }}" class="blob blob-1" alt="">
        <img src="{{ url_for('static', filename='assets/blob.svg') }}" class="blob blob-2" alt="">
    </div>

    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header"><h2>Admin Portal</h2></div>
            <a href="/admin/dashboard" class="nav-link"><i class="fas fa-home"></i> Dashboard</a>
            <a href="/admin/exams" class="nav-link"><i class="fas fa-file-alt"></i> Manage Exams</a>
            <a href="/admin/students" class="nav-link active"><i class="fas fa-users"></i> Manage Students</a>
            <a href="/admin/reopen_requests" class="nav-link"><i class="fas fa-undo"></i> Reopen Requests</a>
            <a href="#" class="nav-link logout-btn" id="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="top-header">
                <h1>Manage Students</h1>
            </div>

            <div class="panel">
                <h3>Registered Students</h3>
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Registered Date</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for student in students %}
                            <tr>
                                <td>{{ student.name }}</td>
                                <td>{{ student.email }}</td>
                                <td>{{ student.created_at }}</td>
                                <td>
                                    <button class="btn-delete" onclick="deleteStudent({{ student.id }}, '{{ student.name }}')">
                                        <i class="fas fa-trash"></i> Delete
                                    </button>
                                </td>
                            </tr>
                            {% else %}
                            <tr>
                                <td colspan="4" style="text-align: center; color: var(--text-muted);">No students registered yet.</td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        document.getElementById('logout-btn').addEventListener('click', async (e) => {
            e.preventDefault();
            const res = await fetch('/api/logout', { method: 'POST' });
            if(res.ok) window.location.href = '/';
        });

        async function deleteStudent(id, name) {
            if(!confirm(`Are you sure you want to delete the student ${name}? This will delete all their results too.`)) return;
            
            try {
                const res = await fetch(`/api/admin/users/${id}`, { method: 'DELETE' });
                const data = await res.json();
                if(res.ok) {
                    window.location.reload();
                } else {
                    alert(data.error || 'Failed to delete student');
                }
            } catch (err) {
                console.error(err);
                alert('An error occurred.');
            }
        }
    </script>
</body>
</html>
