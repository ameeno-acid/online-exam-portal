<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Results - {{ result.exam_title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .result-container {
            width: 100%;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            background: var(--background);
            z-index: 10;
        }

        .result-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            text-align: center;
            position: relative;
        }

        .trophy-icon { font-size: 64px; color: #f59e0b; margin-bottom: 24px; animation: bounce 2s infinite ease-in-out; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .result-title { font-size: 28px; font-weight: 700; color: var(--text-main); margin-bottom: 8px;}
        .exam-name { font-size: 16px; color: var(--text-muted); margin-bottom: 32px;}

        .score-circle {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: var(--surface);
            border: 8px solid var(--primary);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0 auto 32px;
            box-shadow: 0 10px 25px rgba(79, 70, 229, 0.2);
        }
        .score-val { font-size: 40px; font-weight: 800; color: var(--text-main); line-height: 1; margin-bottom: 4px; }
        .score-label { font-size: 14px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 40px; }
        .stat-box { background: var(--input-bg); border-radius: 12px; padding: 16px; border: 1px solid var(--border); }
        .stat-val { font-size: 24px; font-weight: 700; color: var(--text-main); margin-bottom: 4px; }
        .stat-name { font-size: 13px; color: var(--text-muted); font-weight: 600;}

        .stat-box.correct .stat-val { color: #10b981; }
        .stat-box.incorrect .stat-val { color: #ef4444; }

        .btn-home { background: var(--primary); color: white; border: none; padding: 14px 32px; border-radius: 12px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; transition: var(--transition); font-size: 16px;}
        .btn-home:hover { background: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(79, 70, 229, 0.25); }
    </style>
</head>
<body>
    <div class="background-blobs">
        <img src="{{ url_for('static', filename='assets/blob.svg') }}" class="blob blob-1" alt="">
        <img src="{{ url_for('static', filename='assets/blob.svg') }}" class="blob blob-2" alt="">
        <img src="{{ url_for('static', filename='assets/blob.svg') }}" class="blob blob-3" alt="">
    </div>

    <div class="result-container">
        <div class="result-card">
            <i class="fas fa-trophy trophy-icon"></i>
            <h1 class="result-title">Exam Completed!</h1>
            <p class="exam-name">{{ result.exam_title }} <span style="background: rgba(16, 185, 129, 0.1); color: #10b981; padding: 2px 8px; border-radius: 12px; font-size: 11px; margin-left: 8px; font-weight: bold; text-transform: uppercase;">{{ result.difficulty }}</span></p>

            <div class="score-circle">
                <span class="score-val">{{ result.score }}</span>
                <span class="score-label">Points</span>
            </div>

            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-val">{{ result.total_questions }}</div>
                    <div class="stat-name">Total Qs</div>
                </div>
                <div class="stat-box correct">
                    <div class="stat-val">{{ result.score }}</div>
                    <div class="stat-name">Correct</div>
                </div>
                <div class="stat-box incorrect">
                    <div class="stat-val">{{ result.total_questions - result.score }}</div>
                    <div class="stat-name">Incorrect</div>
                </div>
            </div>

            <a href="/student/dashboard" class="btn-home"><i class="fas fa-home"></i> Back to Dashboard</a>
        </div>
    </div>
</body>
</html>
