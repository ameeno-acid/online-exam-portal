<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Online Exam Portal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .auth-container { max-width: 400px; margin: 100px auto; background: var(--surface); padding: 40px; border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.2); }
        .input-group { margin-bottom: 24px; position: relative; }
        .input-group input { width: 100%; height: 50px; background: var(--input-bg); border: 2px solid var(--border); border-radius: 12px; padding: 0 16px 0 45px; font-size: 15px; outline: none; transition: var(--transition); }
        .input-group input:focus { border-color: var(--primary); background: var(--surface); }
        .input-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .btn-auth { width: 100%; height: 50px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: var(--transition); }
        .btn-auth:hover { background: var(--primary-hover); transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="auth-container">
        <h2 style="text-align: center; margin-bottom: 24px;">Reset Password</h2>
        <form id="reset-form">
            <div class="input-group">
                <i class="fas fa-lock input-icon"></i>
                <input type="password" id="new-password" required placeholder="Enter new password">
            </div>
            <button type="submit" class="btn-auth">Set New Password</button>
        </form>
        <p id="msg" style="text-align: center; margin-top: 16px; color: var(--text-muted);"></p>
    </div>

    <script>
        const token = "{{ token }}";
        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('new-password').value;
            const msg = document.getElementById('msg');
            msg.textContent = "Processing...";
            
            try {
                const res = await fetch('/api/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                });
                const data = await res.json();
                
                if (res.ok) {
                    msg.style.color = "#10b981";
                    msg.textContent = data.success;
                    setTimeout(() => window.location.href = '/', 2000);
                } else {
                    msg.style.color = "#ef4444";
                    msg.textContent = data.error;
                }
            } catch (err) {
                msg.style.color = "#ef4444";
                msg.textContent = "Network error occurred.";
            }
        });
    </script>
</body>
</html>
